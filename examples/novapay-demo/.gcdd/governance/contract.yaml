# ═══════════════════════════════════════════════════════════════════════════════
# CONTRATO DE GOVERNANCE — NovaPay Payments API
# Generado por GCDD (Governance-Constrained Driven Development)
# Nivel de ceremonia: Enterprise
# ═══════════════════════════════════════════════════════════════════════════════

version: "1.0.0"
profile: "novapay-api-payments"
description: "API REST para gestión de pagos — NovaPay"
ceremony_level: "enterprise"

# ─── CONVENCIONES DE NOMBRES ──────────────────────────────────────────────────
naming:
  global:
    separator: "-"
    case: "kebab-case"
    max_length: 63
    prefix: "novapay"

  resources:
    api_endpoint:
      pattern: "/api/v{version}/{dominio}/{recurso}"
      example: "/api/v1/payments/transactions"
      validators:
        - "kebab_case"
        - "recursos_pluralizados"
        - "versionado"

    s3_bucket:
      pattern: "{prefix}-{dominio}-{proposito}-{ambiente}"
      example: "novapay-payments-logs-prod"
      validators:
        - "sin_mayusculas"
        - "empieza_con_prefijo"

    lambda_function:
      pattern: "{prefix}-{dominio}-{accion}-{ambiente}"
      example: "novapay-payments-process-prod"

    iam_role:
      pattern: "{PREFIX}-ROLE-{DOMINIO}-{SERVICIO}-{ENV}"
      example: "NOVAPAY-ROLE-PAYMENTS-LAMBDA-PROD"
      validators:
        - "mayusculas"

    database_table:
      pattern: "{dominio}_{entidad}_{proposito}"
      example: "payments_transactions_history"
      validators:
        - "snake_case"

    sqs_queue:
      pattern: "{prefix}-{dominio}-{evento}-{ambiente}"
      example: "novapay-payments-transaction-completed-prod"

# ─── DOMINIOS ─────────────────────────────────────────────────────────────────
domains:
  payments:
    description: "Procesamiento de pagos y transacciones"
    subdomains: ["transactions", "refunds", "settlements", "reconciliation"]
    owner: "equipo-payments"
    data_classification: "pci"

# ─── AMBIENTES ────────────────────────────────────────────────────────────────
environments:
  allowed: ["dev", "staging", "prod"]
  constraints:
    dev:
      regions: ["us-east-1"]
      auto_deploy: true
      approval_required: false
    staging:
      regions: ["us-east-1"]
      auto_deploy: false
      approval_required: true
      approvers: ["tech-lead"]
    prod:
      regions: ["us-east-1"]
      auto_deploy: false
      approval_required: true
      approvers: ["tech-lead", "security-team", "compliance-officer"]
      requires_compliance_report: true
      requires_audit_trail: true

# ─── SEGURIDAD ────────────────────────────────────────────────────────────────
security:
  encryption:
    at_rest: "requerido"
    in_transit: "requerido"
    key_management: "customer-managed"
    forbidden:
      - "S3_MANAGED"
      - "AES256_DEFAULT"
    required:
      - "KMS_CMK"
      - "TLS_1_2_MINIMUM"

  authentication:
    public_endpoints: "prohibido"
    allowed_methods: ["OAuth2", "mTLS"]
    mfa_required_for: ["acceso_prod", "operaciones_admin", "refunds"]
    session_timeout_minutes: 15

  authorization:
    model: "RBAC"
    least_privilege: true
    wildcard_permissions: "prohibido"
    admin_access: "prohibido_en_codigo"
    service_accounts:
      require_rotation: true
      max_key_age_days: 90

  network:
    public_ip: "prohibido"
    vpc_required: true
    security_groups:
      no_open_ingress: true
      no_open_egress: true

  # ─── OWASP API TOP 10 ──────────────────────────────────────────────────────
  owasp:
    api_top_10:
      - id: "API1"
        name: "Broken Object Level Authorization"
        enforce: "todo acceso a transacción requiere validación de ownership del merchant"
        builder_rule: "incluir middleware de auth con verificación de merchant_id en cada endpoint"

      - id: "API2"
        name: "Broken Authentication"
        enforce: "ningún endpoint sin OAuth2, tokens con expiración máxima 15 min"
        builder_rule: "decorador @require_auth obligatorio, token validation middleware"

      - id: "API3"
        name: "Broken Object Property Level Authorization"
        enforce: "campos sensibles (card_number, cvv) nunca se retornan en responses"
        builder_rule: "serializers filtran campos PCI, solo retornan últimos 4 dígitos"

      - id: "API4"
        name: "Unrestricted Resource Consumption"
        enforce: "rate limiting en todos los endpoints: 100 req/min por merchant"
        builder_rule: "rate limiter middleware con throttling por API key"

      - id: "API5"
        name: "Broken Function Level Authorization"
        enforce: "refunds y settlements requieren rol admin o supervisor"
        builder_rule: "rutas de refund/settlement en módulo separado con @require_role('admin')"

  # ─── PCI-DSS ────────────────────────────────────────────────────────────────
  pci_dss:
    requirement_3:
      description: "Proteger datos de tarjeta almacenados"
      enforce: "nunca almacenar CVV, nunca almacenar PAN completo sin encriptar"
      builder_rule: "usar tokenización, solo almacenar últimos 4 dígitos y token"

    requirement_4:
      description: "Encriptar transmisión de datos de tarjeta"
      enforce: "TLS 1.2 mínimo en todas las comunicaciones"
      builder_rule: "enforce TLS en todas las conexiones, rechazar HTTP"

    requirement_6:
      description: "Desarrollar y mantener sistemas seguros"
      enforce: "SAST en cada commit, dependency check semanal"
      builder_rule: "no usar dependencias con CVEs conocidos de severidad alta o crítica"

    requirement_10:
      description: "Rastrear y monitorear todo acceso"
      enforce: "audit logging de toda operación sobre datos de pago"
      builder_rule: "audit logger middleware en cada endpoint que toca datos PCI"

# ─── ARQUITECTURA ─────────────────────────────────────────────────────────────
architecture:
  selected: "layered"
  constraints:
    - "máximo 4 capas: presentation, application, domain, infrastructure"
    - "sin dependencias circulares entre capas"
    - "cada capa solo depende de la capa directamente abajo"
  structure:
    - "src/presentation/     # Controllers, serializers, middlewares"
    - "src/application/      # Casos de uso, DTOs, servicios de aplicación"
    - "src/domain/           # Entidades, reglas de negocio, excepciones"
    - "src/infrastructure/   # Repositorios, clientes AWS, configuración"

# ─── TAGS ─────────────────────────────────────────────────────────────────────
tags:
  required:
    - key: "project"
      value: "novapay-payments"
    - key: "domain"
      value: "payments"
    - key: "environment"
      description: "dev | staging | prod"
    - key: "owner"
      value: "equipo-payments"
    - key: "cost-center"
      description: "Centro de costo asignado"
    - key: "data-classification"
      value: "pci"
    - key: "compliance"
      value: "pci-dss-v4"

# ─── ESCANEO ──────────────────────────────────────────────────────────────────
scanning:
  pre_commit:
    required:
      - tool: "semgrep"
        config: "p/owasp-top-ten"
        fail_on: "error"
      - tool: "gitleaks"
        description: "Detección de secretos, tokens, API keys"
        fail_on: "any"
      - tool: "pip-audit"
        fail_on: "high"
      - tool: "bandit"
        description: "Análisis de seguridad Python"
        fail_on: "medium"

  pre_deploy:
    required:
      - tool: "trivy"
        target: "imágenes de contenedor"
        fail_on: "critical"
      - tool: "checkov"
        target: "templates CDK/CloudFormation"
        fail_on: "high"
      - tool: "owasp-zap"
        target: "endpoints en staging"
        mode: "baseline"

  post_deploy:
    required:
      - tool: "owasp-zap"
        target: "endpoints de producción"
        mode: "full-scan"
        schedule: "semanal"
      - tool: "penetration-test"
        scope: "API completa"
        schedule: "trimestral"
        provider: "tercero certificado PCI-QSA"

# ─── DEPLOYMENT ───────────────────────────────────────────────────────────────
deployment:
  strategy:
    default: "blue-green"
    allowed: ["blue-green", "canary"]
    forbidden: ["big-bang", "rolling"]
  rollback:
    automatic: true
    trigger: "error_rate > 1% OR latency_p99 > 500ms"
  compliance:
    require_report_before_deploy: true
    require_all_scans_passed: true
    require_documentation_updated: true
    require_audit_trail: true
    require_sign_off: ["tech-lead", "security-team", "compliance-officer"]
